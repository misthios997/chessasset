<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis IPS SMP Kelas 9</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --card: #1a2235;
    --accent: #f59e0b;
    --accent2: #3b82f6;
    --success: #10b981;
    --danger: #ef4444;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --border: #1e3a5f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(59,130,246,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(245,158,11,0.08) 0%, transparent 50%);
  }

  /* SPLASH SCREEN */
  #splash {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem; text-align: center;
    animation: fadeIn 0.6s ease;
  }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    padding: 0.3rem 1rem; border-radius: 999px;
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; margin-bottom: 1.5rem;
  }

  h1.title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 6rem);
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
  }

  .subtitle {
    color: var(--muted); font-size: 1rem; margin-bottom: 2.5rem;
  }

  .stats-row {
    display: flex; gap: 2rem; margin-bottom: 2.5rem; flex-wrap: wrap; justify-content: center;
  }

  .stat {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 1rem 1.5rem; text-align: center;
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--accent);
  }

  .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }

  .btn-start {
    background: linear-gradient(135deg, var(--accent2), #1d4ed8);
    color: white; border: none; padding: 1rem 3rem;
    font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
    border-radius: 12px; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.05em;
    box-shadow: 0 4px 24px rgba(59,130,246,0.35);
  }

  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(59,130,246,0.5); }

  /* QUIZ SCREEN */
  #quiz { display: none; padding: 1.5rem; max-width: 800px; margin: 0 auto; animation: fadeIn 0.4s ease; }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.75rem;
  }

  .q-counter {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--accent);
  }

  .progress-wrap { flex: 1; height: 6px; background: var(--card); border-radius: 999px; min-width: 120px; }
  .progress-bar { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width 0.4s ease; }

  .score-badge {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 999px; padding: 0.35rem 0.9rem;
    font-size: 0.85rem; color: var(--accent);
  }

  .question-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.75rem;
    margin-bottom: 1.25rem;
  }

  .q-category {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--accent2); margin-bottom: 0.75rem;
  }

  .q-text { font-size: 1.05rem; line-height: 1.6; font-weight: 500; }

  .options { display: flex; flex-direction: column; gap: 0.65rem; }

  .opt-btn {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 0.85rem 1.1rem;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem; text-align: left; cursor: pointer;
    transition: all 0.18s; display: flex; align-items: center; gap: 0.75rem;
  }

  .opt-btn:hover:not(:disabled) {
    border-color: var(--accent2); background: rgba(59,130,246,0.08);
    transform: translateX(4px);
  }

  .opt-btn.correct { background: rgba(16,185,129,0.15); border-color: var(--success); color: var(--success); }
  .opt-btn.wrong { background: rgba(239,68,68,0.12); border-color: var(--danger); color: var(--danger); }
  .opt-btn.reveal { background: rgba(16,185,129,0.1); border-color: var(--success); }
  .opt-btn:disabled { cursor: default; }

  .opt-letter {
    width: 26px; height: 26px; border-radius: 6px;
    background: var(--card); display: flex; align-items: center; justify-content: center;
    font-size: 0.78rem; font-weight: 700; flex-shrink: 0;
    transition: all 0.18s;
  }

  .opt-btn.correct .opt-letter { background: var(--success); color: white; }
  .opt-btn.wrong .opt-letter { background: var(--danger); color: white; }
  .opt-btn.reveal .opt-letter { background: var(--success); color: white; }

  .feedback-box {
    margin-top: 1rem; padding: 0.85rem 1.1rem;
    border-radius: 10px; font-size: 0.88rem; display: none;
  }

  .feedback-box.show { display: block; }
  .feedback-box.correct { background: rgba(16,185,129,0.12); border: 1px solid var(--success); color: var(--success); }
  .feedback-box.wrong { background: rgba(239,68,68,0.1); border: 1px solid var(--danger); color: #fca5a5; }

  .btn-next {
    display: none; width: 100%; margin-top: 1rem;
    background: linear-gradient(135deg, var(--accent2), #1d4ed8);
    color: white; border: none; padding: 0.9rem;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600;
    border-radius: 10px; cursor: pointer; transition: all 0.2s;
  }

  .btn-next:hover { opacity: 0.9; }
  .btn-next.show { display: block; }

  /* RESULT SCREEN */
  #result {
    display: none; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem; text-align: center;
    animation: fadeIn 0.6s ease;
  }

  .result-ring {
    width: 160px; height: 160px; border-radius: 50%;
    border: 6px solid var(--border); display: flex; flex-direction: column;
    align-items: center; justify-content: center; margin-bottom: 2rem;
    position: relative; overflow: hidden;
    background: conic-gradient(var(--accent) 0%, var(--accent) var(--pct), var(--card) var(--pct));
  }

  .result-inner {
    width: 130px; height: 130px; border-radius: 50%;
    background: var(--bg); display: flex; flex-direction: column;
    align-items: center; justify-content: center; position: absolute;
  }

  .result-score { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; color: var(--accent); line-height: 1; }
  .result-total { font-size: 0.75rem; color: var(--muted); }

  h2.result-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem;
    margin-bottom: 0.5rem;
  }

  .result-msg { color: var(--muted); margin-bottom: 2rem; max-width: 400px; }

  .result-grid {
    display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-bottom: 2rem;
  }

  .res-stat {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 0.9rem 1.5rem; text-align: center;
  }

  .res-stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; }
  .res-stat-num.g { color: var(--success); }
  .res-stat-num.r { color: var(--danger); }

  .btn-retry {
    background: var(--card); border: 1.5px solid var(--border);
    color: var(--text); padding: 0.85rem 2.5rem;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600;
    border-radius: 10px; cursor: pointer; transition: all 0.2s;
  }

  .btn-retry:hover { border-color: var(--accent2); color: var(--accent2); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="badge">📚 IPS SMP Kelas 9</div>
  <h1 class="title">KUIS IPS</h1>
  <p class="subtitle">Latihan Akhir Semester — Uji Pemahamanmu!</p>
  <div class="stats-row">
    <div class="stat"><div class="stat-num">45</div><div class="stat-label">Soal</div></div>
    <div class="stat"><div class="stat-num">4</div><div class="stat-label">Topik</div></div>
    <div class="stat"><div class="stat-num">~</div><div class="stat-label">Waktu</div></div>
  </div>

<!-- QUIZ -->
<div id="quiz">

  <div class="feedback-box" id="feedbackBox"></div>

</div>

<!-- RESULT -->
<div id="result">
  <div class="result-ring" id="resultRing">
    <div class="result-inner">
      <div class="result-score" id="resultScore">0</div>
      <div class="result-total" id="resultTotal">dari 45</div>
    </div>
  </div>
  <h2 class="result-title" id="resultTitle">Selesai!</h2>
  <p class="result-msg" id="resultMsg"></p>
  <div class="result-grid">
    <div class="res-stat"><div class="res-stat-num g" id="resCorrect">0</div><div class="stat-label">Benar</div></div>
    <div class="res-stat"><div class="res-stat-num r" id="resWrong">0</div><div class="stat-label">Salah</div></div>
    <div class="res-stat"><div class="res-stat-num" id="resPercent">0%</div><div class="stat-label">Nilai</div></div>
  </div>
  <button class="btn-retry" onclick="restartQuiz()">🔄 Ulangi Kuis</button>
</div>

let currentQ = 0, score = 0, answered = false;

function startQuiz() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  currentQ = 0; score = 0;
  loadQuestion();
}

function loadQuestion() {
  const q = questions[currentQ];
  answered = false;

  document.getElementById('qCounter').textContent = `${currentQ + 1} / ${questions.length}`;
  document.getElementById('progressBar').style.width = `${(currentQ / questions.length) * 100}%`;
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('qCategory').textContent = q.cat;
  document.getElementById('qText').textContent = q.q;

  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback-box'; fb.textContent = '';

  const next = document.getElementById('btnNext');
  next.className = 'btn-next';

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';

  const letters = ['A','B','C','D'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(i, btn);
    container.appendChild(btn);
  });
}

function selectAnswer(idx, btn) {
  if (answered) return;
  answered = true;

  const q = questions[currentQ];
  const allBtns = document.querySelectorAll('.opt-btn');
  const fb = document.getElementById('feedbackBox');

  allBtns.forEach(b => b.disabled = true);

  // Reveal correct answer
  allBtns[q.ans].classList.add('reveal');

  if (idx === q.ans) {
    btn.classList.add('correct');
    score++;
    fb.textContent = '✅ Benar! Bagus sekali!';
    fb.className = 'feedback-box correct show';
  } else {
    btn.classList.add('wrong');
    fb.textContent = `❌ Salah. Jawaban yang benar adalah: ${q.opts[q.ans]}`;
    fb.className = 'feedback-box wrong show';
  }

  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('btnNext').className = 'btn-next show';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    showResult();
  } else {
    loadQuestion();
  }
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  const res = document.getElementById('result');
  res.style.display = 'flex';

  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultTotal').textContent = `dari ${questions.length}`;
  document.getElementById('resCorrect').textContent = score;
  document.getElementById('resWrong').textContent = questions.length - score;
  document.getElementById('resPercent').textContent = pct + '%';

  const ring = document.getElementById('resultRing');
  ring.style.setProperty('--pct', pct + '%');

  let title, msg;
  if (pct >= 90) { title = "Luar Biasa! 🏆"; msg = "Nilai sangat memuaskan! Kamu benar-benar menguasai materi IPS ini."; }
  else if (pct >= 75) { title = "Hebat! 🎉"; msg = "Nilai bagus! Sedikit lagi kamu bisa mencapai hasil sempurna."; }
  else if (pct >= 60) { title = "Cukup Baik! 📖"; msg = "Lumayan, tapi masih ada ruang untuk meningkatkan pemahaman."; }
  else { title = "Ayo Belajar Lagi! 💪"; msg = "Jangan menyerah! Pelajari kembali materinya dan coba lagi."; }

  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = msg;
}

function restartQuiz() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('splash').style.display = 'flex';
}
</script>
