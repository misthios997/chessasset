<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Keystore SHA-256 Extractor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#14141e;border:1px solid #2a2a3a;border-radius:16px;padding:28px 24px;max-width:420px;width:100%}
h1{font-size:1.1rem;color:#c9a84c;margin-bottom:6px}
p{color:#888899;font-size:.85rem;margin-bottom:20px;line-height:1.6}
.upload{border:2px dashed #2a2a3a;border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:16px}
.upload:hover{border-color:#c9a84c;background:#c9a84c08}
.upload input{display:none}
.upload-icon{font-size:2.5rem;margin-bottom:8px}
.upload-text{font-size:.9rem;color:#888899}
.result{background:#0a0a0f;border:1px solid #2a2a3a;border-radius:10px;padding:16px;margin-top:16px;display:none}
.result.show{display:block}
.label{font-size:.72rem;color:#888899;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.sha{font-family:monospace;font-size:.78rem;color:#55c088;word-break:break-all;line-height:1.7;background:#0d0d18;padding:10px;border-radius:8px;margin-bottom:12px}
.copy-btn{width:100%;padding:12px;background:linear-gradient(135deg,#8b6914,#c9a84c);color:#0a0a0f;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer}
.copy-btn:active{opacity:.85}
.status{font-size:.8rem;margin-top:8px;text-align:center;color:#888899;min-height:18px}
.err{color:#e05555;font-size:.85rem;margin-top:12px;display:none}
.err.show{display:block}
.step{background:#1a1a28;border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:.83rem;color:#c9a84c;border-left:3px solid #c9a84c}
</style>
</head>
<body>
<div class="card">
  <h1>♔ Keystore SHA-256 Extractor</h1>
  <p>Upload file <code style="color:#c9a84c">signing.keystore</code> dari PWABuilder untuk mendapatkan SHA-256 fingerprint.</p>

  <div class="step">📁 Cari <strong>signing.keystore</strong> di folder Downloads</div>

  <div class="upload" onclick="document.getElementById('ksFile').click()">
    <input type="file" id="ksFile" accept=".keystore,.jks,*">
    <div class="upload-icon">📤</div>
    <div class="upload-text">Tap untuk pilih file signing.keystore</div>
  </div>

  <div class="result" id="result">
    <div class="label">SHA-256 Fingerprint</div>
    <div class="sha" id="shaOut"></div>
    <button class="copy-btn" onclick="copySHA()">📋 Copy SHA-256</button>
    <div class="status" id="copyStatus"></div>
  </div>
  <div class="err" id="err"></div>
</div>

<script>
// Parse JKS/BKS keystore binary to extract certificate and compute SHA-256
document.getElementById('ksFile').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  
  try {
    const buf = await file.arrayBuffer();
    const bytes = new Uint8Array(buf);
    
    // JKS magic: 0xFEEDFEED
    const magic = (bytes[0]<<24)|(bytes[1]<<16)|(bytes[2]<<8)|bytes[3];
    
    if (magic === 0xFEEDFEED) {
      // JKS format - parse to find certificate bytes
      const sha256 = await extractJKS(bytes);
      showResult(sha256);
    } else {
      // Try as PKCS12 / BKS - different parsing
      showError('Format keystore tidak dikenali. Coba cara manual di bawah.');
    }
  } catch(err) {
    showError('Error: ' + err.message + '<br><br>Coba cara manual di bawah.');
  }
});

async function extractJKS(bytes) {
  let pos = 4; // skip magic
  const version = readInt(bytes, pos); pos += 4;
  const count = readInt(bytes, pos); pos += 4;
  
  for (let i = 0; i < count; i++) {
    const tag = readInt(bytes, pos); pos += 4;
    // tag 1 = private key, tag 2 = trusted cert
    
    // alias length + alias
    const aliasLen = readShort(bytes, pos); pos += 2;
    pos += aliasLen; // skip alias
    
    // timestamp (8 bytes)
    pos += 8;
    
    if (tag === 1) {
      // private key entry: encrypted key + cert chain
      const keyLen = readInt(bytes, pos); pos += 4;
      pos += keyLen; // skip encrypted key
      
      const chainLen = readInt(bytes, pos); pos += 4;
      for (let j = 0; j < chainLen; j++) {
        const typeLen = readShort(bytes, pos); pos += 2;
        pos += typeLen; // skip type string
        const certLen = readInt(bytes, pos); pos += 4;
        if (j === 0) {
          // First cert = the one we want
          const certBytes = bytes.slice(pos, pos + certLen);
          return await sha256Hex(certBytes);
        }
        pos += certLen;
      }
    } else if (tag === 2) {
      // trusted cert
      const typeLen = readShort(bytes, pos); pos += 2;
      pos += typeLen;
      const certLen = readInt(bytes, pos); pos += 4;
      const certBytes = bytes.slice(pos, pos + certLen);
      return await sha256Hex(certBytes);
    }
  }
  throw new Error('Certificate tidak ditemukan di keystore');
}

async function sha256Hex(data) {
  const hashBuf = await crypto.subtle.digest('SHA-256', data);
  const hashArr = Array.from(new Uint8Array(hashBuf));
  return hashArr.map(b => b.toString(16).padStart(2,'0').toUpperCase()).join(':');
}

function readInt(b, pos) {
  return ((b[pos]<<24)|(b[pos+1]<<16)|(b[pos+2]<<8)|b[pos+3]) >>> 0;
}
function readShort(b, pos) {
  return (b[pos]<<8)|b[pos+1];
}

function showResult(sha) {
  document.getElementById('shaOut').textContent = sha;
  document.getElementById('result').classList.add('show');
  document.getElementById('err').classList.remove('show');
}

function showError(msg) {
  document.getElementById('err').innerHTML = '❌ ' + msg + `
  <br><br>
  <strong style="color:#e8e8f0">Cara manual (pakai terminal/Termux):</strong><br>
  <code style="color:#c9a84c;font-size:.78rem">keytool -list -v -keystore signing.keystore -alias my-key-alias -storepass 4N9hrLSriQ48</code>
  <br><br>Cari baris <strong>SHA256:</strong> di output.`;
  document.getElementById('err').classList.add('show');
}

function copySHA() {
  const sha = document.getElementById('shaOut').textContent;
  navigator.clipboard.writeText(sha).then(() => {
    document.getElementById('copyStatus').textContent = '✅ Copied!';
    setTimeout(() => document.getElementById('copyStatus').textContent = '', 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = sha;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    document.getElementById('copyStatus').textContent = '✅ Copied!';
  });
}
</script>
</body>
</html>
